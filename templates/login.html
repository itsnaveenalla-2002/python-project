<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9; /* Light background */
        }

        /* Center everything */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 320px;
            text-align: center;
            border-radius: 10px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        /* Inputs */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            outline: none;
        }

        input:focus {
            border-color: #2563eb;
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #1e40af;
        }

        /* Extra text */
        .forgot {
            font-size: 12px;
            margin-top: 10px;
            color: #666;
        }

        .new {
            margin-top: 20px;
            font-size: 14px;
            color: #444;
        }

        .new a {
            color: #2563eb;
            text-decoration: none;
            font-weight: bold;
            margin-left: 5px;
        }

        .new a:hover {
            text-decoration: underline;
        }

    </style>
</head>

<body>

<div class="container">
    <div class="login-box">

        <h2>Log in to your Tutor Booking account</h2>

        <form method="POST">
            <input type="email" name="email" placeholder="Email / Mobile Number" required>
            <input type="password" name="password" placeholder="Password" required>

            <button type="submit">Login</button>
        </form>

        <div class="forgot">
            <a href="/forgot-password">Forgot password?</a>a>
            </div>

        <div class="new">
            New to Tutor Booking?
            <a href="/register">Create an account</a>
        </div>

    </div>
</div>

</body>
</html>
