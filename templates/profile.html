{% extends 'base.html' %}

{% block content %}
<h2>My Profile</h2>

<div class="card">
<form method="POST">

    <!-- COMMON -->
    <label>Name</label><br>
    <input type="text" name="name" value="{{ user.name }}"><br><br>

    <label>Email</label><br>
    <input type="email" name="email" value="{{ user.email }}" readonly><br><br>

    <!-- 🎓 STUDENT FIELDS -->
    {% if session['role'] == 'student' %}
        <label>🎓 Class / Course</label><br>
        <input type="text" name="course" value="{{ user.course }}"><br><br>

        <label>📍 Address</label><br>
        <input type="text" name="address" value="{{ user.address }}"><br><br>

        <label>📚 Preferred Subject</label><br>
        <input type="text" name="subject" value="{{ user.subject }}"><br><br>
    {% endif %}

    <!-- 👨‍🏫 TUTOR FIELDS -->
    {% if session['role'] == 'tutor' and tutor %}
        <label>Subject</label><br>
        <input type="text" name="tutor_subject" value="{{ tutor.subject }}"><br><br>

        <label>Experience</label><br>
        <input type="text" name="experience" value="{{ tutor.experience }}"><br><br>

        <label>Qualification</label><br>
        <input type="text" name="qualification" value="{{ tutor.qualification }}"><br><br>
    {% endif %}

    <button class="btn btn-blue">Update</button>

</form>
</div>
{% endblock %}
